name: NullBot CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-core:
    name: Build C++ Core (Windows)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v1.3

      - name: Install CMake
        uses: jwlawson/actions-setup-cmake@v1.14
        with:
          cmake-version: '3.28'

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -A x64

      - name: Build
        run: cmake --build build --config Release --parallel 4

      - name: Run unit tests
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nullbot-core-windows
          path: build/bin/

  test-signatures:
    name: Validate YARA Rules
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install yara
        run: sudo apt-get update -qq && sudo apt-get install -y yara

      - name: Validate YARA rules syntax
        run: |
          for f in signatures/rules/*.yar; do
            echo "Checking $(basename "$f")..."
            yarac "$f" /tmp/compiled_test.yarc
          done

      - name: Test against EICAR
        run: |
          printf '%s' 'X5O!P%@AP[4\PZX54(P^)7CC)7}$EICAR-STANDARD-ANTIVIRUS-TEST-FILE!$H+H*' > test_eicar.com
          yara -r signatures/rules/ test_eicar.com || true

  test-updater:
    name: Test Python Signature Updater
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r signatures/updater/requirements.txt
          pip install pytest

      - name: Run updater tests
        run: pytest tests/unit/test_updater.py -v
